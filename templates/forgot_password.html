<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TruthLens — Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--black:#0a0a0a;--white:#f5f2eb;--cream:#ede9df;--mid:#6b6b6b;--border:#2a2a2a;--border-light:#3a3a3a;--true:#2ecc71;--false:#e74c3c;}
    html,body{min-height:100vh;background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;font-weight:300;}
    body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(245,242,235,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(245,242,235,0.025) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0;}
    .page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;}
    header{border-bottom:1px solid var(--border);padding:1.4rem 2rem;display:flex;align-items:baseline;gap:1rem;}
    .logo{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:0.08em;}
    .logo span{color:var(--false);}
    .tagline{font-size:0.68rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--mid);}
    .main{flex:1;display:flex;align-items:center;justify-content:center;padding:3rem 1rem;}
    .box{width:100%;max-width:440px;}
    .form-title{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;letter-spacing:0.05em;margin-bottom:0.4rem;}
    .form-sub{font-size:0.85rem;color:var(--mid);margin-bottom:2rem;line-height:1.6;}
    .field{margin-bottom:1.4rem;}
    .field label{display:block;font-size:0.65rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--mid);margin-bottom:0.5rem;}
    .field input{width:100%;background:transparent;border:1px solid var(--border);color:var(--white);font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:300;padding:0.9rem 1rem;outline:none;transition:border-color 0.2s;}
    .field input:focus{border-color:var(--border-light);}
    .field input::placeholder{color:#3a3a3a;}
    .btn-submit{width:100%;background:var(--white);color:var(--black);border:none;font-family:'Bebas Neue',sans-serif;font-size:1.15rem;letter-spacing:0.15em;padding:1rem;cursor:pointer;transition:background 0.15s;}
    .btn-submit:hover{background:var(--cream);}
    .btn-submit:disabled{opacity:0.4;cursor:not-allowed;}
    .error-msg{background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.3);color:#e74c3c;font-size:0.85rem;padding:0.8rem 1rem;margin-bottom:1rem;display:none;}
    .error-msg.visible{display:block;}
    .success-msg{background:rgba(46,204,113,0.1);border:1px solid rgba(46,204,113,0.3);color:#2ecc71;font-size:0.85rem;padding:0.8rem 1rem;margin-bottom:1rem;display:none;line-height:1.6;}
    .success-msg.visible{display:block;}
    .back-link{display:inline-flex;align-items:center;gap:0.4rem;font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--mid);text-decoration:none;margin-top:1.2rem;transition:color 0.15s;}
    .back-link:hover{color:var(--white);}
    footer{border-top:1px solid var(--border);padding:1rem 2rem;display:flex;justify-content:space-between;}
    .footer-text{font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:#3a3a3a;}
  </style>
</head>
<body>
<div class="page">
  <header>
    <div class="logo">Truth<span>Lens</span></div>
    <div class="tagline">AI-powered fact verification</div>
  </header>

  <div class="main">
    <div class="box">
      <div class="form-title">Forgot Password</div>
      <div class="form-sub">Enter your email and we'll send you a link to reset your password. The link expires in 1 hour.</div>

      <div class="error-msg"   id="error-msg"></div>
      <div class="success-msg" id="success-msg"></div>

      <div class="field" id="form-fields">
        <label>Email Address</label>
        <input type="email" id="email-input" placeholder="you@example.com" onkeydown="if(event.key==='Enter')submit()"/>
      </div>
      <button class="btn-submit" id="submit-btn" onclick="submit()">SEND RESET LINK</button>

      <a class="back-link" href="/login">← Back to sign in</a>
    </div>
  </div>

  <footer>
    <div class="footer-text">TruthLens &copy; 2025</div>
    <div class="footer-text">meta-llama/llama-3.3-70b via openrouter</div>
  </footer>
</div>

<script>
  async function submit() {
    const btn     = document.getElementById('submit-btn');
    const errEl   = document.getElementById('error-msg');
    const sucEl   = document.getElementById('success-msg');
    const email   = document.getElementById('email-input').value.trim();

    errEl.classList.remove('visible');
    sucEl.classList.remove('visible');

    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      errEl.textContent = 'Please enter a valid email address.';
      errEl.classList.add('visible');
      return;
    }

    btn.disabled = true; btn.textContent = 'SENDING...';

    try {
      const res  = await fetch('/api/forgot-password', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      if (!res.ok) {
        errEl.textContent = data.error || 'Something went wrong. Please try again.';
        errEl.classList.add('visible');
      } else {
        // Hide form, show success
        document.getElementById('form-fields').style.display = 'none';
        btn.style.display = 'none';
        sucEl.textContent = data.message;
        sucEl.classList.add('visible');
      }
    } catch(e) {
      errEl.textContent = 'Connection error. Is the server running?';
      errEl.classList.add('visible');
    } finally {
      btn.disabled = false;
      if (btn.style.display !== 'none') btn.textContent = 'SEND RESET LINK';
    }
  }
</script>
</body>
</html>
